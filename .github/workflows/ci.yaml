name: ci

on:
  push:
  pull_request:

jobs:
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target wasm32-unknown-unknown --release
      - run: cp target/wasm32-unknown-unknown/release/djvu.wasm .
      - name: Verify committed djvu.wasm matches build
        run: cmp djvu.wasm target/wasm32-unknown-unknown/release/djvu.wasm
